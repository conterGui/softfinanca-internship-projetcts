<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js " defer></script>
  </head>
  <body>
    <main>
        <h1>Insira o seu PIN</h1>
    <div class="PassInput">
      <div class="pin-wrapper">
        <div class="pin-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <input id="pin" type="number" maxlength="4" inputmode="numeric"" />
      </div>
      <div id="app"></div>
    </div>
    <h2>Para sair, pressione a tecla <span class="cancel">X Cancel</span> no teclado</h2>
    </main>
    
  </body>
</html>
